<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bingo — Edit Phrases</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --orange: #E8521A; --orange-dk: #B83E10; --orange-lt: #FDE8DC;
    --bg: #FFF7F2; --card: #FFFFFF; --text: #1A1010; --muted: #7A6060;
    --border: rgba(0,0,0,0.09); --radius: 10px;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

  .page { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

  .header { flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 16px 12px; text-align: center; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--orange); letter-spacing: -0.02em; }
  .header p { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

  .body { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; min-height: 0; }

  .counter { font-size: 0.78rem; color: var(--muted); text-align: right; }
  .counter span { font-weight: 700; color: var(--orange); }
  .counter.warn span { color: #E24B4A; }

  textarea {
    flex: 1; width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; line-height: 1.6;
    outline: none; color: var(--text); background: var(--card); resize: none;
    appearance: none; -webkit-appearance: none;
  }
  textarea:focus { border-color: var(--orange); }

  .save-bar { flex-shrink: 0; padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px)); background: var(--bg); border-top: 1px solid var(--border); }
  .btn-save { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 800; padding: 14px; border-radius: 12px; border: none; cursor: pointer; width: 100%; background: var(--orange); color: #fff; touch-action: manipulation; transition: background 0.15s, transform 0.1s; }
  .btn-save:active { background: var(--orange-dk); transform: scale(0.98); }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1A1010; color: #fff; border-radius: 99px; padding: 10px 22px; font-size: 0.82rem; font-weight: 500; transition: transform 0.28s cubic-bezier(.32,.72,0,1), opacity 0.28s; opacity: 0; white-space: nowrap; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>✏️ Edit Phrases</h1>
    <p>Separate phrases with a new line or semicolon</p>
  </div>
  <div class="body">
    <div class="counter" id="counter"><span>0</span> / 24 phrases</div>
    <textarea id="phraseBox" placeholder="Enter your phrases here, one per line or separated by semicolons…" oninput="updateCounter()"></textarea>
  </div>
  <div class="save-bar">
    <button class="btn-save" onclick="savePhrases()">Save phrases</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DEFAULT_PHRASES = [
  "Has traveled to 3+ countries","Speaks 2+ languages","Woke up before 6am today",
  "Loves pineapple on pizza","Has a pet at home","Plays a musical instrument",
  "Prefers tea over coffee","Binge-watched a series overnight","Has met a celebrity",
  "Loves spicy food","Has run a 5K or more","Works from home regularly",
  "Has a hidden talent","Has lived in another city","Is the eldest sibling",
  "Can cook a dish by memory","Read a book this month","Collects something unusual",
  "Has gone camping","Learned something new this week","Is afraid of heights",
  "Can solve a Rubik's cube","Has dyed their hair before","Loves karaoke"
];

function loadPhrases() {
  try {
    const s = localStorage.getItem('bingo_phrases');
    if (s) { const a = JSON.parse(s); if (Array.isArray(a) && a.length === 24) return a; }
  } catch(e) {}
  return [...DEFAULT_PHRASES];
}

function parsePhrases(text) {
  return text.split(/[;\n]+/).map(p => p.trim()).filter(Boolean);
}

function updateCounter() {
  const phrases = parsePhrases(document.getElementById('phraseBox').value);
  const n = phrases.length;
  const el = document.getElementById('counter');
  el.innerHTML = '<span>' + n + '</span> / 24 phrases';
  el.className = 'counter' + (n !== 24 ? ' warn' : '');
}

function savePhrases() {
  const phrases = parsePhrases(document.getElementById('phraseBox').value);
  if (phrases.length < 24) { showToast('⚠ Need exactly 24 phrases (have ' + phrases.length + ')'); return; }
  if (phrases.length > 24) { showToast('⚠ Too many phrases (have ' + phrases.length + ', need 24)'); return; }
  localStorage.setItem('bingo_phrases', JSON.stringify(phrases));
  showToast('✓ Phrases saved!');
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

// Populate textarea with current phrases
document.getElementById('phraseBox').value = loadPhrases().join('\n');
updateCounter();
</script>
</body>
</html>
