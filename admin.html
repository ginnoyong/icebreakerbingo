<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bingo — Edit Phrases</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --orange: #E8521A; --orange-dk: #B83E10; --orange-lt: #FDE8DC;
    --bg: #FFF7F2; --card: #FFFFFF; --text: #1A1010; --muted: #7A6060;
    --border: rgba(0,0,0,0.09); --radius: 10px;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  .page { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }
  .header { flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 16px 12px; text-align: center; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--orange); letter-spacing: -0.02em; }
  .header p { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 10px; min-height: 0; }
  .counter { font-size: 0.78rem; color: var(--muted); text-align: right; }
  .counter span { font-weight: 700; color: var(--orange); }
  .counter.warn span { color: #E24B4A; }
  textarea { flex: 1; width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; line-height: 1.7; outline: none; color: var(--text); background: var(--card); resize: none; appearance: none; }
  textarea:focus { border-color: var(--orange); }
  textarea.loading { opacity: 0.5; }
  .save-bar { flex-shrink: 0; padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px)); background: var(--bg); border-top: 1px solid var(--border); }
  .btn-save { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 800; padding: 14px; border-radius: 12px; border: none; cursor: pointer; width: 100%; background: var(--orange); color: #fff; touch-action: manipulation; transition: background 0.15s, transform 0.1s; }
  .btn-save:active { background: var(--orange-dk); transform: scale(0.98); }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1A1010; color: #fff; border-radius: 99px; padding: 10px 22px; font-size: 0.82rem; font-weight: 500; transition: transform 0.28s cubic-bezier(.32,.72,0,1), opacity 0.28s; opacity: 0; white-space: nowrap; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>✏️ Edit Phrases</h1>
    <p>Separate phrases with a new line or semicolon</p>
  </div>
  <div class="body">
    <div class="counter" id="counter"><span>—</span> / 24 phrases</div>
    <textarea id="phraseBox" placeholder="Loading phrases…" oninput="updateCounter()" class="loading"></textarea>
  </div>
  <div class="save-bar">
    <button class="btn-save" id="saveBtn" onclick="savePhrases()" disabled>Loading…</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://hqgemmfrpbpkecxxxhab.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZ2VtbWZycGJwa2VjeHh4aGFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MzcyMDgsImV4cCI6MjA5NDExMzIwOH0.WjHpA2_MBg-CVY9G6t0cw31f_ZfXT-tZekcBWquT2x4";

const DEFAULT_PHRASES = [
  "Has more than 2 pets","Takes more than 1hr to get to school","Owns a Casio watch",
  "Can speak 3 or more languages","Has cried watching K-drama before","Has a part-time job",
  "Plays Mobile Legends or MLBB","Has a Spotify student plan","Has typed OTW while still at home",
  "Drinks bubble tea 3+ times a week","Is in the school team of a CCA","Has a group chat with 50+ members",
  "Has overslept on an exam day","Follows local influencers on Instagram","Has posted a TikTok before",
  "Has own baby photo(s) in phone","Can recite parents phone numbers by heart","Hates durians",
  "Cannot take spicy food","Has dozed off on the MRT and missed their stop",
  "Plays basketball at the void deck","Has studied for exams at the airport",
  "Has mistaken a stranger for a friend","Has more than 250 followers on social media"
];

const headers = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json"
};

async function loadFromSupabase() {
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/phrases?id=eq.1&select=data", { headers });
    if (!res.ok) throw new Error();
    const json = await res.json();
    if (json && json[0] && Array.isArray(json[0].data)) return json[0].data;
  } catch(e) {}
  return [...DEFAULT_PHRASES];
}

async function saveToSupabase(phrases) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/phrases?id=eq.1", {
    method: "PATCH",
    headers: { ...headers, "Prefer": "return=minimal" },
    body: JSON.stringify({ data: phrases })
  });
  if (!res.ok) throw new Error("Save failed: " + res.status);
}

function parsePhrases(text) {
  return text.split(/[;\n]+/).map(p => p.trim()).filter(Boolean);
}

function updateCounter() {
  const n = parsePhrases(document.getElementById('phraseBox').value).length;
  const el = document.getElementById('counter');
  el.innerHTML = '<span>' + n + '</span> / 24 phrases';
  el.className = 'counter' + (n !== 24 ? ' warn' : '');
}

async function savePhrases() {
  const phrases = parsePhrases(document.getElementById('phraseBox').value);
  if (phrases.length !== 24) {
    showToast('⚠ Need exactly 24 phrases (have ' + phrases.length + ')');
    return;
  }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    await saveToSupabase(phrases);
    showToast('✓ Saved! All devices will see the new phrases.');
  } catch(e) {
    showToast('✗ Save failed — check connection');
  }
  btn.disabled = false;
  btn.textContent = 'Save phrases';
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
(async () => {
  const phrases = await loadFromSupabase();
  const box = document.getElementById('phraseBox');
  box.value = phrases.join('\n');
  box.classList.remove('loading');
  const btn = document.getElementById('saveBtn');
  btn.disabled = false;
  btn.textContent = 'Save phrases';
  updateCounter();
})();
</script>
</body>
</html>
