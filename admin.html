<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bingo Admin — Customize Phrases</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --orange: #E8521A;
    --orange-dk: #B83E10;
    --orange-lt: #FDE8DC;
    --bg: #FFF7F2;
    --card: #FFFFFF;
    --text: #1A1010;
    --muted: #7A6060;
    --border: rgba(0,0,0,0.09);
    --radius: 10px;
    --danger: #E24B4A;
  }

  html, body {
    min-height: 100%; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
  }

  .page { max-width: 480px; margin: 0 auto; padding: 0 0 48px; }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-row { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--orange-lt); border: none; cursor: pointer;
    color: var(--orange); font-size: 1.1rem;
    flex-shrink: 0; touch-action: manipulation;
    transition: background 0.15s;
  }
  .back-btn:active { background: #f5c9b3; }
  .header h1 {
    font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800;
    color: var(--orange); letter-spacing: -0.02em;
  }

  /* ── Lock screen ── */
  .lock-screen { padding: 40px 20px; text-align: center; }
  .lock-icon { font-size: 3rem; margin-bottom: 12px; }
  .lock-screen h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .lock-screen p { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }

  .pw-field {
    width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 1.1rem;
    outline: none; text-align: center; letter-spacing: 0.2em;
    color: var(--text); background: var(--card); appearance: none;
    margin-bottom: 10px;
  }
  .pw-field:focus { border-color: var(--orange); }
  .pw-err { font-size: 0.78rem; color: var(--danger); min-height: 1.2em; margin-bottom: 12px; }

  /* ── Editor ── */
  .editor { padding: 16px; display: none; }
  .editor.show { display: block; }

  .editor-intro {
    background: var(--orange-lt); border-radius: var(--radius); padding: 12px 14px;
    font-size: 0.8rem; color: var(--orange-dk); line-height: 1.5; margin-bottom: 16px;
  }
  .editor-intro strong { font-weight: 700; }

  .phrase-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .phrase-row {
    display: flex; align-items: center; gap: 8px;
  }
  .phrase-num {
    font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700;
    color: var(--muted); width: 20px; flex-shrink: 0; text-align: right;
  }
  .phrase-input {
    flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    outline: none; color: var(--text); background: var(--card); appearance: none;
    transition: border-color 0.15s;
  }
  .phrase-input:focus { border-color: var(--orange); }
  .phrase-input::placeholder { color: #bbb; }

  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
    padding: 13px 20px; border-radius: 12px; border: none; cursor: pointer;
    touch-action: manipulation; transition: background 0.15s, transform 0.1s;
    text-align: center; width: 100%;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--orange); color: #fff; }
  .btn-primary:active { background: var(--orange-dk); }
  .btn-ghost { background: var(--card); color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:active { background: #f0e8e4; }
  .btn-danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
  .btn-danger:active { background: #fef0f0; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1A1010; color: #fff; border-radius: 99px;
    padding: 10px 20px; font-size: 0.82rem; font-weight: 500;
    transition: transform 0.3s cubic-bezier(.32,.72,0,1), opacity 0.3s;
    opacity: 0; white-space: nowrap; z-index: 999; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Lock screen btn ── */
  .lock-screen .btn { max-width: 260px; margin: 0 auto; display: block; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="window.location.href='index.html'" aria-label="Back to game">←</button>
      <h1>Customize Phrases</h1>
    </div>
  </div>

  <!-- Lock screen -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-icon">🔒</div>
    <h2>Admin access</h2>
    <p>Enter the password to edit the 25 bingo phrases.</p>
    <input
      class="pw-field" id="pwInput"
      type="password" placeholder="Password"
      autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();checkPw();}"
    >
    <div class="pw-err" id="pwErr"></div>
    <button class="btn btn-primary" onclick="checkPw()">Unlock</button>
  </div>

  <!-- Phrase editor -->
  <div class="editor" id="editor">
    <div class="editor-intro">
      <strong>25 phrases</strong> — these will be randomly shuffled into each player's bingo card. Keep phrases short and fun!
    </div>

    <div class="phrase-list" id="phraseList"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="savePhrases()">💾 Save phrases</button>
      <button class="btn btn-ghost" onclick="exportTxt()">↓ Export as .txt</button>
      <button class="btn btn-ghost" onclick="importTrigger()">↑ Import from .txt</button>
      <button class="btn btn-danger" onclick="resetToDefaults()">↺ Reset to defaults</button>
    </div>

    <input type="file" id="importFile" accept=".txt" style="display:none" onchange="importTxt(event)">
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let PASSWORD_HASH = null;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function loadPasswordHash() {
  try {
    const res = await fetch('password.txt?nc=' + Date.now());
    if (!res.ok) throw new Error();
    PASSWORD_HASH = (await res.text()).trim();
  } catch(e) {
    PASSWORD_HASH = await sha256('03052015');
  }
}

async function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (!PASSWORD_HASH) { showToast('⚠ Still loading, try again'); return; }
  const hash = await sha256(v);
  if (hash === PASSWORD_HASH) {
    document.getElementById('pwErr').textContent = '';
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('editor').classList.add('show');
    renderEditor(loadPhrases());
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

loadPasswordHash();

const DEFAULT_PHRASES = [
  "Has traveled to 3+ countries",
  "Speaks 2+ languages",
  "Woke up before 6am today",
  "Loves pineapple on pizza",
  "Has a pet at home",
  "Plays a musical instrument",
  "Prefers tea over coffee",
  "Binge-watched a series overnight",
  "Has met a celebrity",
  "Loves spicy food",
  "Has run a 5K or more",
  "Works from home regularly",
  "Has a hidden talent",
  "Has lived in another city",
  "Is the eldest sibling",
  "Can cook a dish by memory",
  "Read a book this month",
  "Collects something unusual",
  "Has gone camping",
  "Learned something new this week",
  "Is afraid of heights",
  "Can solve a Rubik's cube",
  "Has dyed their hair before",
  "Loves karaoke"
];

function loadPhrases() {
  try {
    const s = localStorage.getItem('bingo_phrases');
    if (s) { const a = JSON.parse(s); if (Array.isArray(a) && a.length === 24) return a; }
  } catch(e) {}
  return [...DEFAULT_PHRASES];
}

function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (v === PASSWORD) {
    document.getElementById('pwErr').textContent = '';
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('editor').classList.add('show');
    renderEditor(loadPhrases());
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function renderEditor(phrases) {
  const list = document.getElementById('phraseList');
  list.innerHTML = '';
  phrases.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'phrase-row';
    row.innerHTML = `
      <span class="phrase-num">${i + 1}</span>
      <input class="phrase-input" type="text" maxlength="80"
        value="${escHtml(p)}" placeholder="Phrase ${i + 1}…"
        data-idx="${i}" autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter'){event.preventDefault();focusNext(${i});}">
    `;
    list.appendChild(row);
  });
}

function focusNext(i) {
  const inputs = document.querySelectorAll('.phrase-input');
  if (inputs[i + 1]) inputs[i + 1].focus();
  else savePhrases();
}

function getPhrases() {
  return Array.from(document.querySelectorAll('.phrase-input')).map(el => el.value.trim() || `Phrase ${Number(el.dataset.idx)+1}`);
}

function savePhrases() {
  const phrases = getPhrases();
  localStorage.setItem('bingo_phrases', JSON.stringify(phrases));
  showToast('✓ Phrases saved!');
}

function resetToDefaults() {
  if (!confirm('Reset all 25 phrases to the defaults?')) return;
  localStorage.removeItem('bingo_phrases');
  renderEditor([...DEFAULT_PHRASES]);
  showToast('↺ Reset to defaults');
}

function exportTxt() {
  const phrases = getPhrases();
  const content = phrases.map((p, i) => `${i + 1}. ${p}`).join('\n');
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bingo-phrases.txt';
  a.click();
  showToast('↓ Exported bingo-phrases.txt');
}

function importTrigger() { document.getElementById('importFile').click(); }

function importTxt(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const lines = ev.target.result.split('\n')
      .map(l => l.replace(/^\d+\.\s*/, '').trim())
      .filter(Boolean);
    if (lines.length < 24) { showToast('⚠ Need at least 24 lines'); return; }
    renderEditor(lines.slice(0, 24));
    showToast('↑ Imported ' + file.name);
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
